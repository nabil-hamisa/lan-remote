<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#111111"/>

  <!-- Monitor body -->
  <rect x="8" y="10" width="48" height="30" rx="4" fill="#1e1e1e" stroke="#0a84ff" stroke-width="2.5"/>

  <!-- Monitor screen glow -->
  <rect x="12" y="14" width="40" height="22" rx="2" fill="#0a1f3d" opacity="0.9"/>

  <!-- Wi-Fi arcs (centered in screen) -->
  <!-- Outer arc -->
  <path d="M18 30 Q32 16 46 30" fill="none" stroke="#0a84ff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Middle arc -->
  <path d="M22 33 Q32 23 42 33" fill="none" stroke="#0a84ff" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <!-- Inner arc -->
  <path d="M26.5 36 Q32 30 37.5 36" fill="none" stroke="#0a84ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Dot -->
  <circle cx="32" cy="39" r="3" fill="#0a84ff"/>

  <!-- Monitor stand neck -->
  <rect x="29" y="40" width="6" height="8" rx="1" fill="#0a84ff" opacity="0.7"/>
  <!-- Monitor stand base -->
  <rect x="21" y="48" width="22" height="4" rx="2" fill="#0a84ff" opacity="0.7"/>
</svg>
